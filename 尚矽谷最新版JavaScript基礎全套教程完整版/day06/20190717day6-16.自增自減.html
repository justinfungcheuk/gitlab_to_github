<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title></title>
    <script type="text/javascript">
        /*
         * 自增 ++
         * - 通過自增可以使變量在自身的基礎上增加 1
         * - 對於一個變量自增以後, 原變量的值會立即自增 1
         * - 自增分成兩種: 後++(a++) 和 前++(++a)
         *   無論是 a++ 還是 ++a, 都會立即使原變量的值自增 1,
         *    - 不同的是 a++ 和 ++a 的值不同
         * - a++ 的值等於原變量的值(自增前的值) , 也就是原值
         * - ++a 的值等於原變量自增後的值 = 原變量新值 (自增後的值) , 也就是新值
         *
         *
         * 自減 --
         * - 通過自減可以使變量在自身的基礎上減 1
         * - 自減分成兩種: 後-- (a--) 和 前-- (--a)
         *  無論是a-- 還是 --a 都會立即使原變量的值自減 1
         *   不同的是 --a 和 --a 的值不同
         *   a-- 是變量的原值 (自減前的值)
         *   --a 是變量的新值
         *
         */

        var num = 10;

        //num--;
        //console.log(num--);

        //--num; 
        console.log(--num);

        console.log("num = " + num);

        var a = 1;

        //使a自增1
        //a++;
        //a++;  
        //++a;

        //console.log(a++);

        //console.log("++a = " + ++a);

        //console.log("a++ = " + a++);

        //console.log("a = "+a);

        var c = 10;

        //使c自增1, 第一次c++, 是在10的基礎上自增
        //c++;
        //console.log(c++);

        //第二次c++, 是在11的基礎上自增
        c++;

        var d = 20;

        //console.log(++d); //21
        //console.log(++d); //22

        //20 + 22 + 22
        //var result = d++ + ++d + d;
        //console.log("result ="+result);

        //d = 20
        d = d++;
        //因為給 d 賦值了兩次, 一個變量 等於 一個值, 所以先執行 d++ 後,
        // d 就變成了 = 21, 自增了, 而 d++ 的值是20 把它的值又賦值回去了 d
        // 總結是先把它變成 21, 然後再把它給賦值回去了 d 所以是 20
        // 所以只需要先看 d++ 是 多少, d 就等於 = 多少

        /*

         * d = e;
         */

    </script>
