<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF">
        <title></title>
        <script type="text/javascript">
            
            /*
             * 通過程序, 在頁面中輸出如下的圖形:
               
               *      1 <1 i = 0
               **     2 <2 i = 1
               ***    3 <3 i = 2
               ****   4 <4 i = 3
               *****  5 <5 i = 4
               
               *****
               *****
               *****
               *****
               *****
               
               ***** 1 j<5 i = 0
               ****  2 j<4 i = 1
               ***   3 j<3 i = 2
               **    4 j<2 i = 3
               *     5 j<1 i = 4
               
             */
            
            //向 body 中輸出一個內容
            //document.write("*****<br />");
            
            //通過一個 for 循環來輸出圖形
            //這個 for 循環執行幾次, 圖形的高度就是多少
            //它可以用來控制圖形的高度
            for(var i=0 ; i<5 ; i++){
                
                /*
                 * 在循環的內部再創建一個循環, 用來控制圖形的寬度
                 * 目前我們的外部的 for 循環執行 1 次, 內部就會執行 5 次
                 *
                 * 內層循環可以來決定圖形的寬度, 執行幾次圖形的寬度就是多少
                 */
                
                //for(var j=0 ; j<10 ; j++)  //平衡寬度和長度
                //for(var j=0 ; j<i+1 ; j++) //從小至大增加寬度
                for(var j=0 ; j<5-i ; j++){  //從大至小縮小寬度
                    document.write("*&nbsp;&nbsp;&nbsp;"); //&nbsp; 增加寬度
                }
                    
                    //輸出一個換行
                    document.write("<br />");
                    
                
                
            }
            
        </script>
    </head>
</html>
