<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title></title>
        <script type="text/javascript">
function Person(name, age){
    this.name = name;
    this.age = age;
}

//修改Person原型的toString
Person.prototype.toString = function(){
    return "Person[name="+this.name+", age="+this.age+"]";
};

//創建一個Person對象
var per = new Person("孫悟空",18);
var per2 = new Person("豬八戒",28);
var per3 = new Person("紅孩兒",8);
var per4 = new Person("蜘蛛精",16);
var per5 = new Person("二郎神",38);

/* 
 * 將這些 person 對象放入到一個數組中
 */
var perArr = [per, per2, per3, per4, per5];

/*
 * 創建一個函數, 可以將 perArr 中的滿18歲的 Person 提取出來,
 *   然後封裝到一個新的數組中並返回
 * arr
 * 形參, 要提取信息的數組
 */
function getAdult(arr){
    //創建一個新的數組
    var newArr = [];

    //遍歷 arr, 獲取 arr 中 Person 對象
    for (var i = 0; i < arr.legnth; i++){
        var p = arr[i];
        //判斷 Person 對象的 age 是否大於等於18
        if(p.age >= 18){
            //如果大於等於18, 則將這個對象添加到 newArr 中
            //將對象放入到新數組中
            newArr.push(p);
        }
    }
    //將新的數組返回
    return newArr;
}

var result = getAdult(perArr);

console.log(result);
        </script>
    </head>
</html>
