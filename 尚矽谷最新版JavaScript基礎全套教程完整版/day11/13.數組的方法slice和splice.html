<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title></title>
        <script type="text/javascript">

        var arr = ["孫悟空", "豬八戒", "沙和尚", "唐僧", "白骨精"];

        /*
         * slice()
         * - 可以用來從數組提取出指定元素
         * - 該方法不會改變元素數組, 而是將截取到的元素封裝到一個新數組中返回
         * - 參數:
         *  1. 截取開始的位置的索引, 包含開始索引
         *  2. 截取結束的位置的索引, 不包含結束索引
         *             - 第二個參數可以省略不寫, 此時會截取從開始索引往後的所有元素
         * - 索引可以傳遞一個負值, 如果傳遞一個負值, 則從後往前計算
         *     -1 倒數第一個
         *     -2 倒數第二個
         */

         var result = arr.slice(0,4);
         
         result = arr.slice(1);

         result = arr.slice(1, -2);

         //console.log(result);

         /*
          * splice()
          * - 可以用於刪除數組中的指定元素
          */
          arr.splice(0,2);

          console.log(arr);

        </script>
    </head>
</html>
